<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block-Relief — বন্যা ত্রাণ সহায়তা বিতরণ ব্যবস্থা</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #18263d;
      --bg2: #20314d;
      --bg3: #2a3c5f;
      --bg4: #32466c;
      --card: rgba(34, 50, 78, 0.92);
      --card2: rgba(44, 63, 98, 0.95);
      --border: rgba(147, 197, 253, 0.12);
      --border2: rgba(147, 197, 253, 0.28);
      --accent: #3b82f6;
      --accent2: #93c5fd;
      --teal: #14b8a6;
      --teal2: #5eead4;
      --amber: #f59e0b;
      --red: #ef4444;
      --green: #22c55e;
      --text: #eef4ff;
      --text2: #d2def3;
      --text3: #96a9c8;
      --mono: 'Space Mono', monospace;
      --sans: 'Sora', sans-serif;
      --shadow: 0 18px 40px rgba(7, 12, 24, 0.22);
    }

    body {
      font-family: var(--sans);
      background:
        radial-gradient(circle at top left, rgba(96,165,250,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(45,212,191,0.10), transparent 24%),
        linear-gradient(180deg, #1a2a43 0%, #1f3150 35%, #243a5d 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(147,197,253,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(147,197,253,0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(56,189,248,0.08), transparent 18%),
        radial-gradient(circle at 80% 30%, rgba(45,212,191,0.07), transparent 16%),
        radial-gradient(circle at 50% 80%, rgba(59,130,246,0.06), transparent 22%);
      pointer-events: none;
      z-index: 0;
      filter: blur(18px);
    }

    #root { position: relative; z-index: 1; }

    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: rgba(147,197,253,0.35); border-radius: 4px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes glow { 0%,100% { box-shadow: 0 0 8px rgba(96,165,250,0.18); } 50% { box-shadow: 0 0 24px rgba(96,165,250,0.30); } }

    .fade-in { animation: fadeIn 0.5s ease forwards; }
    .slide-in { animation: slideIn 0.4s ease forwards; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px; font-family: var(--sans);
      font-size: 14px; font-weight: 500; cursor: pointer;
      border: none; transition: all 0.2s; white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: #fff; }
    .btn-primary:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .btn-outline {
      background: rgba(255,255,255,0.02); color: var(--accent2);
      border: 1px solid var(--border2);
      backdrop-filter: blur(8px);
    }
    .btn-outline:hover { background: rgba(59,130,246,0.10); }
    .btn-teal { background: linear-gradient(135deg, #0f9f90, #2dd4bf); color: #fff; }
    .btn-teal:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { filter: brightness(1.1); }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .btn-lang {
      background: rgba(255,255,255,0.06);
      color: var(--accent2);
      border: 1px solid var(--border2);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      font-family: var(--sans);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(8px);
    }
    .btn-lang:hover {
      background: rgba(147,197,253,0.14);
      border-color: var(--accent2);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .card-glow { animation: glow 3s ease infinite; }

    .stat-card {
      background: linear-gradient(180deg, rgba(48,67,102,0.95), rgba(39,57,88,0.95));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      box-shadow: var(--shadow);
    }
    .stat-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 600; font-family: var(--mono); }
    .stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
    .form-input {
      width: 100%; padding: 11px 14px; background: rgba(26,39,63,0.72);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: var(--sans); font-size: 14px;
      outline: none; transition: border-color 0.2s, background 0.2s;
    }
    .form-input:focus { border-color: var(--accent2); background: rgba(31,47,75,0.92); }
    .form-select {
      width: 100%; padding: 10px 14px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--sans); font-size: 14px;
      outline: none; cursor: pointer;
    }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      padding: 10px 14px; text-align: left; font-size: 11px;
      color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border); font-family: var(--mono);
    }
    td {
      padding: 11px 14px; border-bottom: 1px solid var(--border);
      color: var(--text2);
    }
    tr:hover td { background: rgba(147,197,253,0.05); }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 500;
    }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .badge-green { background: rgba(34,197,94,0.14); color: #86efac; }
    .badge-green::before { background: #86efac; }
    .badge-amber { background: rgba(245,158,11,0.14); color: #fde68a; }
    .badge-amber::before { background: #fde68a; }
    .badge-blue { background: rgba(59,130,246,0.14); color: #93c5fd; }
    .badge-blue::before { background: #93c5fd; }
    .badge-red { background: rgba(239,68,68,0.14); color: #fca5a5; }
    .badge-red::before { background: #fca5a5; }

    .progress-bar {
      height: 10px; background: rgba(16,24,39,0.35);
      border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--teal));
      border-radius: 999px; transition: width 1s ease;
    }

    .hash {
      font-family: var(--mono); font-size: 11px; color: #bfd5f4;
      background: rgba(18,28,47,0.55); padding: 6px 8px; border-radius: 8px;
      word-break: break-all;
      border: 1px solid rgba(147,197,253,0.08);
    }

    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; border-bottom: 1px solid var(--border);
      background: rgba(20, 31, 50, 0.76); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 100;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text);
    }
    .navbar-brand span { color: var(--accent2); }

    .layout { display: flex; min-height: calc(100vh - 65px); }
    .sidebar {
      width: 230px; min-width: 230px; background: rgba(24, 38, 61, 0.72);
      border-right: 1px solid var(--border); padding: 24px 0;
      position: sticky; top: 65px; height: calc(100vh - 65px);
      overflow-y: auto; backdrop-filter: blur(12px);
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 20px; font-size: 14px; color: var(--text2);
      cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent;
    }
    .sidebar-item:hover { color: var(--text); background: rgba(147,197,253,0.06); }
    .sidebar-item.active {
      color: var(--accent2); border-left-color: var(--accent);
      background: rgba(147,197,253,0.09);
    }
    .sidebar-icon { font-size: 16px; width: 20px; text-align: center; }
    .main-content { flex: 1; padding: 32px; overflow-y: auto; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
      padding: 12px 20px; border-radius: 12px; font-size: 14px;
      animation: fadeIn 0.3s ease; display: flex; align-items: center; gap: 8px;
      max-width: 360px;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }
    .toast-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .toast-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .toast-info { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }

    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2);
      border-top-color: currentColor; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: inline-block;
    }

    .landing { min-height: 100vh; display: flex; flex-direction: column; }
    .hero {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 88px 24px 70px;
    }
    .hero-title {
      font-family: var(--mono); font-size: clamp(34px,5.8vw,66px);
      font-weight: 700; line-height: 1.14; margin-bottom: 16px;
      max-width: 980px;
    }
    .hero-title span { color: var(--accent2); }
    .hero-sub {
      font-size: 16px; color: var(--text2); max-width: 720px;
      line-height: 1.85; margin-bottom: 34px;
    }

    .hero-note {
      max-width: 860px;
      padding: 16px 18px;
      border: 1px solid rgba(147,197,253,0.18);
      background: rgba(27, 41, 66, 0.52);
      border-radius: 14px;
      color: var(--text2);
      line-height: 1.7;
      font-size: 13px;
      margin-bottom: 28px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .portal-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 20px; max-width: 860px; width: 100%; margin: 0 auto;
    }
    .portal-card {
      background: linear-gradient(180deg, rgba(34,50,78,0.95), rgba(30,44,69,0.96));
      border: 1px solid var(--border);
      border-radius: 18px; padding: 28px 22px; cursor: pointer;
      transition: all 0.25s; text-align: center;
      box-shadow: var(--shadow);
    }
    .portal-card:hover {
      border-color: var(--border2); transform: translateY(-4px);
      background: linear-gradient(180deg, rgba(42,60,93,0.98), rgba(34,50,78,0.98));
    }
    .portal-icon { font-size: 34px; margin-bottom: 12px; }
    .portal-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .portal-desc { font-size: 12px; color: var(--text3); line-height: 1.65; }

    .section-header { margin-bottom: 24px; }
    .section-title { font-size: 21px; font-weight: 600; margin-bottom: 6px; }
    .section-sub { font-size: 13px; color: var(--text3); line-height: 1.6; }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    .flex { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .flex-center { display: flex; align-items: center; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .gap-16 { gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mb-8 { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-24 { margin-bottom: 24px; }
    .text-mono { font-family: var(--mono); }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 11px; }
    .text-accent { color: var(--accent2); }
    .text-teal { color: var(--teal2); }
    .text-amber { color: #fde68a; }
    .text-red { color: #fca5a5; }
    .text-green { color: #86efac; }
    .text-muted { color: var(--text2); }
    .text-dim { color: var(--text3); }
    .font-600 { font-weight: 600; }

    .alert {
      padding: 12px 16px; border-radius: 10px; font-size: 13px; line-height: 1.6;
      backdrop-filter: blur(8px);
    }
    .alert-info { background: rgba(59,130,246,0.10); border: 1px solid rgba(59,130,246,0.18); color: #bfdbfe; }
    .alert-warning { background: rgba(245,158,11,0.10); border: 1px solid rgba(245,158,11,0.20); color: #fde68a; }
    .alert-success { background: rgba(34,197,94,0.10); border: 1px solid rgba(34,197,94,0.20); color: #bbf7d0; }
    .alert-danger { background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.20); color: #fecaca; }

    .hero-mini-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 14px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto 28px;
    }

    .hero-mini-stat {
      background: rgba(27,41,66,0.58);
      border: 1px solid rgba(147,197,253,0.14);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero-mini-stat .num {
      font-family: var(--mono);
      font-size: 22px;
      color: var(--accent2);
      margin-bottom: 6px;
    }

    .hero-mini-stat .lbl {
      font-size: 12px;
      color: var(--text3);
      line-height: 1.5;
    }

    .quote-strip {
      max-width: 920px;
      width: 100%;
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .quote-item {
      background: rgba(24,36,58,0.52);
      border: 1px solid rgba(147,197,253,0.12);
      border-left: 4px solid rgba(147,197,253,0.50);
      border-radius: 14px;
      padding: 16px 18px;
      color: #dce9fb;
      line-height: 1.8;
      text-align: left;
      box-shadow: var(--shadow);
    }

    .quote-item small {
      display: block;
      margin-top: 8px;
      color: var(--text3);
      font-size: 11px;
    }

    @media (max-width: 768px) {
      .portal-grid { grid-template-columns: 1fr; max-width: 340px; }
      .sidebar { display: none; }
      .navbar { padding: 12px 16px; }
      .main-content { padding: 16px; }
      .grid-3, .grid-4, .hero-mini-stats { grid-template-columns: 1fr 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .hero { padding: 60px 16px 50px; }
    }

    @media (max-width: 520px) {
      .grid-3, .grid-4, .hero-mini-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>

<div id="root"></div>

<script type="text/babel">

// ============================================================
//  UTILS
// ============================================================
function fmtETH(wei) {
  if (!wei) return "0.0000";
  return (parseFloat(ethers.utils.formatEther(wei))).toFixed(4);
}
function fmtBDT(wei) {
  if (!wei) return "0";
  const eth = parseFloat(ethers.utils.formatEther(wei));
  return Math.round(eth * CONFIG.ETH_TO_BDT).toLocaleString("en-BD");
}
function shortAddr(addr) {
  if (!addr) return "—";
  return addr.slice(0, 6) + "..." + addr.slice(-4);
}
function shortHash(hash) {
  if (!hash) return "—";
  return hash.slice(0, 12) + "...";
}

// ============================================================
//  HOOKS
// ============================================================
function useContract() {
  const [provider, setProvider] = useState(null);
  const [signer, setSigner] = useState(null);
  const [contract, setContract] = useState(null);
  const [account, setAccount] = useState(null);
  const [isConnected, setIsConnected] = useState(false);

  const connect = async () => {
    if (!window.ethereum) throw new Error("MetaMask not found! Please install MetaMask.");
    const web3Provider = new ethers.providers.Web3Provider(window.ethereum);
    await web3Provider.send("eth_requestAccounts", []);

    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: "0x539" }],
      });
    } catch (switchError) {
      // ignore if already on correct chain
    }

    const web3Signer = web3Provider.getSigner();
    const addr = await web3Signer.getAddress();
    const ct = new ethers.Contract(CONFIG.CONTRACT_ADDRESS, ABI, web3Signer);

    setProvider(web3Provider);
    setSigner(web3Signer);
    setContract(ct);
    setAccount(addr);
    setIsConnected(true);
    return { provider: web3Provider, signer: web3Signer, contract: ct, account: addr };
  };

  return { provider, signer, contract, account, isConnected, connect };
}

// ============================================================
//  TOAST
// ============================================================
function Toast({ msg, type, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 4000);
    return () => clearTimeout(t);
  }, []);
  const icon = type === "success" ? "✓" : type === "error" ? "✕" : "ℹ";
  return (
    <div className={`toast toast-${type}`}>
      <span>{icon}</span> {msg}
    </div>
  );
}

  const [loading, setLoading] = useState(false);
  const [stats, setStats] = useState(null);
  const [victims, setVictims] = useState([]);
  const [donors, setDonors] = useState([]);
  const [donorCount, setDonorCount] = useState(0);
  const [backendData, setBackendData] = useState(null);
  const [distributing, setDistributing] = useState(false);
  const [withdrawingReserve, setWithdrawingReserve] = useState(false);
  const [newTarget, setNewTarget] = useState('');

  const loadStats = useCallback(async () => {
    if (!contract) return;
    try {
      const [collected, target, pct] = await contract.getFundProgress();
      const balance = await contract.getContractBalance();
      const reserve = await contract.getReserveBalance();
      const vCount = await contract.victimCount();
      const dCount = await contract.getDonorCount();
      const isDist = await contract.isDistributed();
      const adminAddr = await contract.admin();

      setStats({ collected, target, pct: pct.toNumber(), balance, reserve, vCount: vCount.toNumber(), isDist, adminAddr });
      setDonorCount(dCount.toNumber());

      const vs = [];
      for (let i = 1; i <= Math.min(vCount.toNumber(), 20); i++) {
        try {
          const [vid, hash, score, relief, wallet, isPaid] = await contract.getVictim(i);
          vs.push({ vid: vid.toNumber(), hash, score: score.toNumber() / 100, relief, wallet, isPaid });
        } catch {}
      }
      setVictims(vs);

      const ds = [];
      for (let i = 0; i < Math.min(dCount.toNumber(), 10); i++) {
        try {
          const [addr, amt, ticket, donatedAt] = await contract.getDonor(i);
          ds.push({ addr, amt, ticket: ticket.toNumber(), donatedAt: donatedAt.toNumber() });
        } catch {}
      }
      setDonors(ds);
    } catch (e) {
      showToast(t.dataLoadError + e.message, "error");
    }
  }, [contract]);

  const loadBackendData = useCallback(async () => {
    try {
      const res = await fetch(`${CONFIG.PYTHON_API}/api/summary`);
      if (res.ok) setBackendData(await res.json());
    } catch {
      setBackendData({
        total_victims: 100,
        verified: 100,
        rejected: 10,
        total_submissions: 110,
        verification_rate: 90.9,
        total_allocated_bdt: 1000000,
        avg_score: 53.2,
        receipts: 0,
      });
    }
  }, []);

  useEffect(() => {
    if (isConnected) { loadStats(); loadBackendData(); }

    setDistributing(true);

// ============================================================
//  ADMIN — Sensitivity Analysis
// ============================================================
function AdminSensitivity({ backendData }) {
  const { t } = useLang();
  const baseWeights = { [t.povertyIndex]:38.2, [t.waterDepth]:24.5, [t.shelterDist]:17.8, [t.houseType]:11.3, [t.floodDuration]:8.2 };
  const [weights, setWeights] = useState({...baseWeights});
  const [results, setResults] = useState(null);
  const totalWeight = Object.values(weights).reduce((a,b)=>a+b,0);

  const keys = Object.keys(baseWeights);

  const runAnalysis = () => {
    const victims = Array.from({length:10}, (_,i) => ({
      id: i+1,
      name: `${t.recipientLabel} #${i+1}`,
      normDepth: Math.random(),
      normHouse: Math.random(),
      normDuration: Math.random(),
      normPoverty: 0.4 + Math.random()*0.6,
      normDistance: Math.random(),
    }));
    const w = weights;
    const sum = totalWeight;
    const scored = victims.map(v => ({
      ...v,
      baseScore: (v.normDepth*baseWeights[keys[1]] + v.normHouse*baseWeights[keys[3]] +
        v.normDuration*baseWeights[keys[4]] + v.normPoverty*baseWeights[keys[0]] +
        v.normDistance*baseWeights[keys[2]]) / 100,
      newScore: (v.normDepth*w[keys[1]] + v.normHouse*w[keys[3]] +
        v.normDuration*w[keys[4]] + v.normPoverty*w[keys[0]] +
        v.normDistance*w[keys[2]]) / sum,
    }));
    setResults(scored);
  };

  const resetWeights = () => setWeights({...baseWeights});

  return (
    <div>
      <div className="section-header">
        <div className="section-title">{t.sensitivityTitle}</div>
        <div className="section-sub">{t.sensitivityDesc}</div>
      </div>
      <div className="alert alert-info mb-16">
        {t.sensitivityInfo}
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="flex-between mb-16">
            <div style={{fontWeight:600}}>{t.adjustWeights}</div>
            <button className="btn btn-outline btn-sm" onClick={resetWeights}>{t.resetBtn}</button>
          </div>
          {Object.entries(weights).map(([key, val]) => (
            <div key={key} style={{marginBottom:'16px'}}>
              <div className="flex-between mb-8">
                <span className="text-sm">{key}</span>
                <span className="text-sm text-mono text-accent">{val.toFixed(1)}%</span>
              </div>
              <input type="range" min="1" max="60" step="0.5" value={val}
                onChange={e => setWeights(p => ({...p, [key]: parseFloat(e.target.value)}))}
                style={{width:'100%', accentColor:'var(--accent)'}} />
            </div>
          ))}
          <div className={`alert ${Math.abs(totalWeight-100) < 5 ? 'alert-success' : 'alert-warning'} mt-8`}>
            {t.totalLabel}: {totalWeight.toFixed(1)}% {Math.abs(totalWeight-100) < 5 ? t.approx100 : t.adjustTo100}
          </div>
          <button className="btn btn-primary mt-16" style={{width:'100%'}} onClick={runAnalysis}>
            {t.runAnalysis}
          </button>
        </div>
        <div className="card">
          <div style={{fontWeight:600, marginBottom:'16px'}}>{t.resultsLabel}</div>
          {!results ? (
            <div style={{padding:'40px', textAlign:'center', color:'var(--text3)'}}>
              {t.adjustAndRun}
            </div>
          ) : (
            <div className="table-wrap">
              <table>
                <thead><tr><th>{t.recipientLabel}</th><th>{t.prevScore}</th><th>{t.newScore}</th><th>{t.changeLabel}</th></tr></thead>
                <tbody>
                  {results.sort((a,b)=>b.newScore-a.newScore).map(v => {
                    const diff = ((v.newScore - v.baseScore) * 100).toFixed(1);
                    const isUp = diff > 0;
                    return (
                      <tr key={v.id}>
                        <td>{v.name}</td>
                        <td className="text-mono">{(v.baseScore*100).toFixed(1)}</td>
                        <td className="text-mono text-accent">{(v.newScore*100).toFixed(1)}</td>
                        <td className={isUp ? 'text-green' : 'text-red'}>
                          {isUp ? '↑' : '↓'} {Math.abs(diff)}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
//  ADMIN — SMS Log Viewer
// ============================================================
function AdminSmsLog() {
  const { t } = useLang();
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');
  const [error, setError] = useState(null);

  const loadLogs = () => {
    setLoading(true);
    setError(null);

    fetch(`${CONFIG.PYTHON_API}/api/sms_log`)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        if (Array.isArray(data) && data.length > 0) {
          setLogs(data);
        } else if (Array.isArray(data) && data.length === 0) {
          setLogs([]);
        } else {
          throw new Error('Invalid data format');
        }
      })
      .catch(err => {
        setError(err.message);
        setLogs([
          { Timestamp:'2026-05-27 10:00:01', Mobile:'8801301581457', Status:'SENT',
            Message:'Block-Relief\nপ্রিয় সুবিধাভোগী,\nআপনার ত্রাণ তহবিল নিশ্চিত হয়েছে।\nপরিমাণ: 5,000 BDT' },
          { Timestamp:'2026-05-27 10:00:02', Mobile:'8801712636928', Status:'SIMULATED',
            Message:'Block-Relief\nপ্রিয় সুবিধাভোগী,\nআপনার ত্রাণ তহবিল নিশ্চিত হয়েছে।\nপরিমাণ: 8,500 BDT' },
          { Timestamp:'2026-05-27 10:00:03', Mobile:'8801710966841', Status:'SIMULATED_WHITELIST',
            Message:'Block-Relief\nপ্রিয় সুবিধাভোগী...' },
        ]);
      })
      .finally(() => setLoading(false));
  };

  useEffect(() => { loadLogs(); }, []);

  const filtered = filter === 'all' ? logs : logs.filter(l => {
    if (filter === 'SIMULATED') return l.Status?.startsWith('SIMULATED');
    if (filter === 'FAILED') return l.Status === 'FAILED' || l.Status === 'ERROR';
    return l.Status === filter;
  });

  const statusColor = s => ({
    SENT:                'badge-green',
    SIMULATED:           'badge-blue',
    SIMULATED_WHITELIST: 'badge-amber',
    FAILED:              'badge-red',
    ERROR:               'badge-red',
    NO_NUMBER:           'badge-red',
  }[s] || 'badge-blue');

  const counts = {
    SENT:      logs.filter(l => l.Status === 'SENT').length,
    SIMULATED: logs.filter(l => l.Status?.startsWith('SIMULATED')).length,
    FAILED:    logs.filter(l => l.Status === 'FAILED' || l.Status === 'ERROR').length,
  };

  const filterButtons = [
    { id: 'all', label: t.allLabel },
    { id: 'SENT', label: t.sentLabel },
    { id: 'SIMULATED', label: t.simulated },
    { id: 'FAILED', label: t.failedLabel },
  ];

  return (
    <div>
      <div className="section-header">
        <div className="flex-between">
          <div>
            <div className="section-title">{t.smsLogTitle}</div>
            <div className="section-sub">{t.smsLogDesc}</div>
          </div>
          <button className="btn btn-outline btn-sm" onClick={loadLogs}>
            {t.refreshLoad}
          </button>
        </div>
      </div>

      {error && (
        <div className="alert alert-warning mb-16" style={{fontSize:'12px'}}>
          {t.apiError}
        </div>
      )}

      <div className="grid-3 mb-16">
        {[
          { label: t.realSmsSent,  val: counts.SENT,      color: 'var(--green)'   },
          { label: t.simulated,    val: counts.SIMULATED, color: 'var(--accent2)' },
          { label: t.failedError,  val: counts.FAILED,    color: 'var(--red)'     },
        ].map(s => (
          <div key={s.label} className="stat-card" style={{textAlign:'center'}}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{color: s.color, fontSize:'24px'}}>{s.val}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="flex gap-8 mb-16" style={{flexWrap:'wrap', alignItems:'center'}}>
          <span className="text-xs text-dim">{t.filterLabel}:</span>
          {filterButtons.map(f => (
            <button key={f.id}
              className={`btn btn-sm ${filter === f.id ? 'btn-primary' : 'btn-outline'}`}
              onClick={() => setFilter(f.id)}>
              {f.label} {f.id === 'all' ? `(${logs.length})` : ''}
            </button>
          ))}
          <span className="text-xs text-dim" style={{marginLeft:'auto'}}>
            {t.showingLast50}
          </span>
        </div>

        {loading ? (
          <div style={{padding:'32px', textAlign:'center'}}>
            <span className="spinner"/> {t.loadingSms}
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>{t.timeLabel}</th>
                  <th>{t.mobileLabel}</th>
                  <th>{t.statusLabel}</th>
                  <th>{t.msgPreview}</th>
                </tr>
              </thead>
              <tbody>
                {filtered.slice(-50).reverse().map((l, i) => (
                  <tr key={i}>
                    <td className="text-mono text-xs">{l.Timestamp}</td>
                    <td className="text-mono text-sm">
                      +{String(l.Mobile || '').replace(/^\+/, '')}
                    </td>
                    <td>
                      <span className={`badge ${statusColor(l.Status)}`}>
                        {l.Status}
                      </span>
                    </td>
                    <td className="text-xs text-muted">
                      {String(l.Message || '')
                        .split('\n')
                        .filter(x => x.trim())
                        .slice(0, 2)
                        .join(' | ')
                        .slice(0, 65)}...
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {filtered.length === 0 && (
              <div style={{padding:'32px', textAlign:'center', color:'var(--text3)'}}>
                {filter === 'all' ? t.noSmsLog : t.noFilterEntry}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

                <div style={{height:'100%', width:`${c.weight}%`, background:c.color, borderRadius:'999px', transition:'width 1s ease'}} />
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function DonorDashboard({ showToast }) {
  const { t } = useLang();
  const { contract, account, isConnected, connect } = useContract();
  const [tab, setTab] = useState('donate');
  const [donateAmt, setDonateAmt] = useState('');
  const [donating, setDonating] = useState(false);
  const [stats, setStats] = useState(null);
  const [myTicket, setMyTicket] = useState(null);
  const [myDonation, setMyDonation] = useState(null);
  const [txHistory, setTxHistory] = useState([]);
  const [paidVictims, setPaidVictims] = useState([]);

  useEffect(() => {
    if (account) {
      try {
        const saved = localStorage.getItem(`br_tx_history_${account.toLowerCase()}`);
        setTxHistory(saved ? JSON.parse(saved) : []);
      } catch {
        setTxHistory([]);
      }
    } else {
      setTxHistory([]);
    }
  }, [account]);

  const loadStats = useCallback(async () => {
    if (!contract) return;
    try {
      const [collected, target, pct] = await contract.getFundProgress();
      const balance = await contract.getContractBalance();
      const reserve = await contract.getReserveBalance();
      const dCount = await contract.getDonorCount();
      const vCount = await contract.victimCount();
      const isDist = await contract.isDistributed();
      setStats({ collected, target, pct: pct.toNumber(), balance, reserve, dCount: dCount.toNumber(), vCount: vCount.toNumber(), isDist });

      try {
        const ticket = await contract.getMyTicket();
        setMyTicket(ticket.toNumber());
      } catch {}

      try {
        const dIndex = await contract.donorIndex(account);
        const idx = dIndex.toNumber();
        if (idx > 0) {
          const [addr, amt, tick, donAt] = await contract.getDonor(idx - 1);
          setMyDonation({ addr, amt, tick: tick.toNumber(), donAt: donAt.toNumber() });
        } else {
          const dCount2 = await contract.getDonorCount();
          for (let i = 0; i < dCount2.toNumber(); i++) {
            const [addr, amt, tick, donAt] = await contract.getDonor(i);
            if (addr.toLowerCase() === account.toLowerCase()) {
              setMyDonation({ addr, amt, tick: tick.toNumber(), donAt: donAt.toNumber() });
              break;
            }
          }
        }
      } catch {}

      if (isDist) {
        try {
          const vCount2 = await contract.victimCount();
          const pvs = [];
          for (let i = 1; i <= vCount2.toNumber(); i++) {
            try {
              const [vid, hash, score, relief, wallet, isPaid] = await contract.getVictim(i);
              if (isPaid) {
                pvs.push({
                  vid: vid.toNumber(),
                  score: score.toNumber() / 100,
                  relief,
                  wallet,
                });
              }
            } catch {}
          }
          setPaidVictims(pvs);
        } catch {}
      }

    } catch(e) {
      console.error(e);
    }
  }, [contract, account]);

  useEffect(() => {
    if (isConnected) loadStats();
  }, [isConnected]);

  const handleDonate = async () => {
    if (!contract || !donateAmt) return;
    setDonating(true);
    try {
      const wei = ethers.utils.parseEther(donateAmt);
      const tx = await contract.donate({ value: wei });
      showToast(t.donationTxSent, "info");
      const receipt = await tx.wait();
      showToast(`✓ ${donateAmt}${t.donatedSuccessSuffix}`, "success");
      const newEntry = {
        hash: receipt.transactionHash,
        amount: donateAmt,
        time: new Date().toLocaleString(),
        block: receipt.blockNumber
      };
      setTxHistory(prev => {
        const updated = [newEntry, ...prev];
        try { localStorage.setItem(`br_tx_history_${account.toLowerCase()}`, JSON.stringify(updated)); } catch {}
        return updated;
      });
      setDonateAmt('');
      loadStats();
    } catch(e) {
      showToast(e.reason || e.message, "error");
    }
    setDonating(false);
  };

  const sidebarItems = [
    { id: 'donate', icon: '💎', label: t.sideDonate },
    { id: 'track',  icon: '📡', label: t.sideTrack },
    { id: 'impact', icon: '🌊', label: t.sideImpact },

    return (
      <div style={{display:'flex', alignItems:'center', justifyContent:'center', minHeight:'60vh'}}>

          <div style={{fontSize:'48px', marginBottom:'16px'}}>💎</div>
          <h2 style={{fontSize:'20px', marginBottom:'8px'}}>{t.donorPortal}</h2>
          <p className="text-muted text-sm" style={{marginBottom:'24px', lineHeight:'1.8'}}>
            {t.donorPortalDesc}

function VictimPortal({ showToast }) {
  const { t } = useLang();
  const [tab, setTab] = useState('status');
  const [nid, setNid] = useState('');
  const [phone, setPhone] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [checked, setChecked] = useState(false);
  const [readContract, setReadContract] = useState(null);

  useEffect(() => {
    try {
      const provider = new ethers.providers.JsonRpcProvider(CONFIG.GANACHE_URL);
      const ct = new ethers.Contract(CONFIG.CONTRACT_ADDRESS, ABI, provider);
      setReadContract(ct);
    } catch {}
  }, []);

  const [claiming, setClaiming] = useState(false);
  const { contract, isConnected, connect } = useContract();

  const lookup = async () => {
    if (!nid.trim()) { showToast(t.enterNid, "error"); return; }
    setLoading(true);
    setChecked(false);
    let data = null;
    try {
      const res = await fetch(`${CONFIG.PYTHON_API}/api/victim?nid=${encodeURIComponent(nid.trim().toUpperCase())}`);
      if (res.ok) {
        data = await res.json();
      }
    } catch {}

    if (!data) data = mockData(nid.trim());

    if (data && data.found && readContract) {
      try {
        const [vCount, totalDist, isDist] = await readContract.getDistributionProgress();
        const victimData = await readContract.getVictim(data.victim_id);
        const isPaidOnChain = victimData.isPaid;

        if (isPaidOnChain) {
          data.stage = 'Disbursed';
        } else if (isDist) {
          data.stage = data.verification_status === 'Verified' ? 'Approved' : 'Rejected';
        } else {
          const statusMap = { 'Verified': 'Verified', 'Pending': 'Pending' };
          data.stage = statusMap[data.verification_status] || 'Pending';
          data.receipt_id = null;
          data.tx_hash = null;
        }
      } catch (e) {
         console.error("Contract read error", e);
      }
    }

    setResult(data);
    setChecked(true);
    setLoading(false);
  };

  const handleClaim = async () => {
    if (!isConnected) {
       try { await connect(); } catch(e) { showToast(e.message, "error"); return; }
    }
    setClaiming(true);
    try {
      const tx = await contract.claimRelief(result.victim_id);
      showToast("Claim transaction sent...", "info");
      await tx.wait();
      showToast("Relief claimed successfully!", "success");
      lookup();
    } catch (e) {
      showToast(e.reason || e.message, "error");
    }
    setClaiming(false);
  };

  const mockData = (searchNid) => {
    if (!searchNid.toUpperCase().startsWith('NID')) return { found: false };
    const num = parseInt(searchNid.replace(/\D/g,'')) || 91;
    return {
      found: true,
      nid: searchNid.toUpperCase(),
      name: "Babul Khatun",
      upazila: "Zakiganj",
      mfs_account: `bKash-${String(num).padStart(5,'0')}`,
      verification_status: "Verified",
      vulnerability_score: 69.18,
      allocated_fund_bdt: 11572,
      traditional_equal_bdt: 10000,
      water_depth_ft: 10.0,
      duration_days: 9,
      distance_km: 11.0,
      house_type: "Kutcha (Type 1)",
      poverty_index: 0.76,
      stage: "Approved",
      receipt_id: null,
      tx_hash: null,
    };
  };

  const stageColor = (stage) => {
    const map = { Pending:'badge-amber', Verified:'badge-blue', Approved:'badge-blue', Disbursed:'badge-green', Rejected:'badge-red' };
    return map[stage] || 'badge-amber';
  };
  const stages = ['Pending', 'Verified', 'Approved', 'Disbursed'];
  const stageLabels = {
    Pending: t.stagePending,
    Verified: t.stageVerified,
    Approved: t.stageApproved,
    Disbursed: t.stageDisbursed,
    Rejected: t.stageRejected,
  };

        <div style={{textAlign:'center', marginBottom:'28px'}}>

          <h1 style={{fontSize:'24px', fontWeight:'600', marginBottom:'8px'}}>{t.victimPortalTitle}</h1>
          <p className="text-muted text-sm">{t.victimPortalDesc}</p>
        </div>

        <div style={{display:'flex', gap:'8px', marginBottom:'24px', background:'rgba(255,255,255,0.03)', padding:'6px', borderRadius:'12px', border:'1px solid var(--border)'}}>
          {[
            { id:'status', label: t.checkStatusTab },
          ].map(tabItem => (
            <button key={tabItem.id} onClick={() => setTab(tabItem.id)} style={{
              flex:1, padding:'10px', border:'none', borderRadius:'8px', cursor:'pointer',
              background: tab===tabItem.id ? 'var(--accent)' : 'transparent',

                <label className="form-label">{t.nidLabel}</label>
                <input className="form-input" placeholder={t.nidPlaceholder}
                  value={nid} onChange={e => setNid(e.target.value)}
                  onKeyDown={e => e.key==='Enter' && lookup()}
                  style={{fontSize:'16px', padding:'14px'}} />
              </div>
              <div className="form-group">
                <label className="form-label">{t.phoneLabel}</label>
                <input className="form-input" placeholder={t.phonePlaceholder}
                  value={phone} onChange={e => setPhone(e.target.value)} />
              </div>
              <button className="btn btn-teal" style={{width:'100%', padding:'14px', fontSize:'16px'}}
                disabled={loading} onClick={lookup}>
                {loading ? <><span className="spinner"/> {t.searching}</> : t.checkStatusAction}
              </button>
            </div>

            {checked && result && (
              <div className="fade-in">
                {!result.found ? (
                  <div className="card" style={{textAlign:'center', padding:'40px'}}>
                    <div style={{fontSize:'40px', marginBottom:'12px'}}>❌</div>
                    <div style={{fontWeight:600, marginBottom:'8px'}}>{t.notFound}</div>
                    <div className="text-muted text-sm" style={{lineHeight:'1.8'}}>
                      {t.notFoundDesc}
                    </div>
                  </div>
                ) : (
                  <div>
                    {/* ===== Application Stages ===== */}
                    <div className="card mb-16">
                      <div style={{fontWeight:600, marginBottom:'20px'}}>{t.appStages}</div>
                      <div style={{display:'flex', alignItems:'center'}}>
                        {stages.map((stage, i) => {
                          const currentIdx = stages.indexOf(result.stage);
                          const isDone = i <= currentIdx;
                          const isCurrent = i === currentIdx;
                          return (
                            <React.Fragment key={stage}>
                              <div style={{flex:1, textAlign:'center'}}>
                                <div style={{
                                  width:'38px', height:'38px', borderRadius:'50%', margin:'0 auto 8px',
                                  background: isDone ? 'var(--teal)' : 'rgba(255,255,255,0.06)',
                                  border:`2px solid ${isDone ? 'var(--teal)' : 'var(--border)'}`,
                                  display:'flex', alignItems:'center', justifyContent:'center',
                                  fontSize:'14px', fontWeight:'600', color: isDone ? '#fff' : 'var(--text3)',
                                  boxShadow: isCurrent ? '0 0 12px rgba(45,212,191,0.45)' : 'none',
                                }}>
                                  {isDone ? '✓' : i+1}
                                </div>
                                <div style={{fontSize:'11px', color: isDone ? 'var(--teal2)' : 'var(--text3)', fontWeight: isCurrent ? 600 : 400}}>
                                  {stageLabels[stage]}
                                </div>
                              </div>
                              {i < stages.length-1 && (
                                <div style={{flex:'0 0 16px', height:'2px', background: i<currentIdx ? 'var(--teal)' : 'var(--border)', marginBottom:'20px'}} />
                              )}
                            </React.Fragment>
                          );
                        })}
                      </div>
                    </div>

                    {/* ===== Applicant Info ===== */}
                    <div className="card mb-16">
                      <div className="flex-between mb-16">
                        <div style={{fontWeight:600}}>{t.applicantInfo}</div>
                        <span className={`badge ${stageColor(result.stage)}`}>{stageLabels[result.stage]}</span>
                      </div>
                      <div className="grid-2">
                        {[
                          [t.nameLabel, result.name],
                          ['NID', result.nid],
                          [t.upazilaLabel, result.upazila],
                          [t.mfsAccount, result.mfs_account],
                          [t.houseTypeLabel, result.house_type],
                          [t.povertyIdx, result.poverty_index],
                        ].map(([k,v]) => (
                          <div key={k} style={{padding:'8px 0', borderBottom:'1px solid var(--border)'}}>
                            <div className="text-xs text-dim">{k}</div>
                            <div className="text-sm mt-8" style={{fontWeight:500}}>{v}</div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* ===== Flood Info ===== */}
                    <div className="card mb-16">
                      <div style={{fontWeight:600, marginBottom:'16px'}}>{t.floodInfo}</div>
                      <div className="grid-3">
                        {[
                          [t.waterDepthFt, result.water_depth_ft+' ft'],
                          [t.durationDays, result.duration_days + t.daysSuffix],
                          [t.distanceKm, result.distance_km+' km'],
                        ].map(([k,v]) => (
                          <div key={k} className="stat-card" style={{textAlign:'center'}}>
                            <div className="stat-label">{k}</div>
                            <div className="stat-value text-accent" style={{fontSize:'20px'}}>{v}</div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* ===== Relief Allocation ===== */}
                    <div className="card mb-16">
                      <div style={{fontWeight:600, marginBottom:'16px'}}>{t.reliefAllocation}</div>
                      <div className="grid-2">
                        <div className="stat-card">
                          <div className="stat-label">{t.vulnScore}</div>
                          <div className="stat-value text-accent">{result.vulnerability_score}</div>
                          <div className="stat-sub">{t.vulnCalc}</div>
                        </div>
                        <div className="stat-card">
                          <div className="stat-label">{t.yourAllocation}</div>
                          <div className="stat-value text-teal">৳{result.allocated_fund_bdt?.toLocaleString()}</div>
                          <div className="stat-sub">{t.vsEqualShare}: ৳{result.traditional_equal_bdt?.toLocaleString()}</div>
                        </div>
                      </div>

                      {result.stage === 'Approved' && (
                        <button className="btn btn-primary mt-16" style={{width:'100%', padding:'14px'}}
                          onClick={handleClaim} disabled={claiming}>
                          {claiming ? <><span className="spinner"/> Claiming...</> : '🎁 Claim Relief Funds'}
                        </button>
                      )}

                      <div className="alert alert-info mt-16" style={{fontSize:'12px'}}>
                        {t.vulnExplain}
                      </div>
                    </div>

                    {/* ===== Payment Receipt ===== */}
                    {result.receipt_id && (
                      <div className="card">
                        <div style={{fontWeight:600, marginBottom:'16px'}}>{t.paymentReceipt}</div>
                        {[[t.receiptId, result.receipt_id], [t.txHashLabel, result.tx_hash]].map(([k,v]) => (
                          <div key={k} style={{marginBottom:'12px'}}>
                            <div className="text-xs text-dim mb-8">{k}</div>
                            <div className="hash">{v}</div>
                          </div>
                        ))}
                        <div className="badge badge-green mt-8">{t.paymentConfirmed}</div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
//  APP ROOT
// ============================================================
function App() {
  const [page, setPage] = useState('landing');
  const [toast, setToast] = useState(null);
  const [lang, setLang] = useState('bn');

  const t = TRANSLATIONS[lang];

  const showToast = (msg, type='info') => {
    setToast({ msg, type, id: Date.now() });
  };

  return (
    <LangContext.Provider value={{ lang, setLang, t }}>
      <div>
        <Navbar page={page} onBack={() => setPage('landing')} />

        {page === 'landing' && <LandingPage onNavigate={setPage} />}
        {page === 'admin'   && <AdminDashboard showToast={showToast} />}
        {page === 'donor'   && <DonorDashboard showToast={showToast} />}
        {page === 'victim'  && <VictimPortal showToast={showToast} />}

        {toast && (
          <Toast
            key={toast.id}
            msg={toast.msg}
            type={toast.type}
            onClose={() => setToast(null)}
          />
        )}
      </div>
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
